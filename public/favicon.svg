<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#33d4ff" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <filter id="glow-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Stylized Hexagonal Vault Outline -->
  <polygon 
    points="16,3 29,10.5 29,25.5 16,29 3,25.5 3,10.5" 
    stroke="url(#glow-grad)" 
    stroke-width="2" 
    stroke-linejoin="round"
    filter="url(#glow-filter)"
  />
  <!-- Inner Braces & Core -->
  <path 
    d="M 12 10 C 9.5 10, 9.5 11, 9.5 13.5 C 9.5 15, 8.5 16, 7.5 16 C 8.5 16, 9.5 17, 9.5 18.5 C 9.5 21, 9.5 22, 12 22" 
    stroke="#33d4ff" 
    stroke-width="1.5" 
    stroke-linecap="round"
  />
  <path 
    d="M 20 10 C 22.5 10, 22.5 11, 22.5 13.5 C 22.5 15, 23.5 16, 24.5 16 C 23.5 16, 22.5 17, 22.5 18.5 C 22.5 21, 22.5 22, 20 22" 
    stroke="#8b5cf6" 
    stroke-width="1.5" 
    stroke-linecap="round"
  />
  <circle cx="16" cy="16" r="2.2" fill="#33d4ff" filter="url(#glow-filter)" />
</svg>
